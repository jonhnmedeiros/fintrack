services:
  postgres:
    image: postgres:16
    container_name: fintrack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fintrack
    ports:
      - "5432:5432"
    volumes:
      - fintrack_postgres_data:/var/lib/postgresql/data

volumes:
  fintrack_postgres_data:
